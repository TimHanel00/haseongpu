experiment:
  minRaysPerSample: 2000
  maxRaysPerSample: 1000000
  mseThreshold: 0.01087 # this is the volume weighting adjusted threshold (scaled the original 0.005 by thickness * mesh.surface )
  adaptiveSteps: 8
  useReflections: true

compute:
  backend: Host_Cpu_CpuOmpBlocks
  openpmd_backend: auto
  parallel_mode: single
  numDevices: 1
  n_per_node: 1
  write_vtk: false
